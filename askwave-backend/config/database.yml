# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("POSTGRES_USER", ENV.fetch("USER", "postgres")) %>
  password: <%= ENV["POSTGRES_PASSWORD"] %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "askwave_backend_development") %>
  pool: 5

test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_TEST_DB", "askwave_backend_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_PRODUCTION_DB", "askwave_backend_production") %>
